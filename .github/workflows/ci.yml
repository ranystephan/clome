name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - '*.md'

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build libghostty
        run: |
          cd vendor/ghostty
          zig build -Demit-xcframework -Demit-macos-app=false -Doptimize=ReleaseFast -Dxcframework-target=native
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"

      - name: Fix xcframework paths
        run: |
          XC="vendor/ghostty/macos/GhosttyKit.xcframework"
          if [ ! -d "$XC/macos-arm64_x86_64" ] && [ -d "$XC/macos-arm64" ]; then
            ln -s macos-arm64 "$XC/macos-arm64_x86_64"
          fi
          # Symlink library name if needed
          if [ -f "$XC/macos-arm64_x86_64/libghostty-fat.a" ] && [ ! -f "$XC/macos-arm64_x86_64/libghostty.a" ]; then
            ln -s libghostty-fat.a "$XC/macos-arm64_x86_64/libghostty.a"
          fi

      - name: Inject Firebase config
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > Resources/GoogleService-Info.plist
            echo "Firebase config injected"
          else
            echo "No Firebase config secret — app will skip Firebase init"
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Clome
        run: |
          xcodebuild -project Clome.xcodeproj -scheme Clome \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build
