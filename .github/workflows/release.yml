name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build libghostty
        run: |
          cd vendor/ghostty
          zig build -Demit-xcframework -Doptimize=ReleaseFast

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Clome (Release)
        run: |
          xcodebuild -project Clome.xcodeproj -scheme Clome \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build

      - name: Package DMG and ZIP
        id: package
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Clome.app"
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="arm64"

          mkdir -p dist

          # Create DMG
          DMG_NAME="Clome-${VERSION}-${ARCH}.dmg"
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Clome" -srcfolder dmg-staging \
            -ov -format UDZO "dist/${DMG_NAME}"
          rm -rf dmg-staging

          # Create ZIP
          ZIP_NAME="Clome-${VERSION}-${ARCH}.zip"
          cd "$(dirname "$APP_PATH")"
          zip -r -y "${GITHUB_WORKSPACE}/dist/${ZIP_NAME}" Clome.app
          cd "${GITHUB_WORKSPACE}"

          echo "dmg=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip=dist/${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clome v${{ steps.package.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.dmg }}
            ${{ steps.package.outputs.zip }}
