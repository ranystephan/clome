name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0-alpha)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build libghostty
        run: |
          cd vendor/ghostty
          zig build -Demit-xcframework -Demit-macos-app=false -Doptimize=ReleaseFast -Dxcframework-target=native
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"

      - name: Fix xcframework paths
        run: |
          XC="vendor/ghostty/macos/GhosttyKit.xcframework"
          echo "XCFramework contents:"
          ls -la "$XC/" || true
          # Symlink for header/lib path compatibility
          if [ ! -d "$XC/macos-arm64_x86_64" ] && [ -d "$XC/macos-arm64" ]; then
            ln -s macos-arm64 "$XC/macos-arm64_x86_64"
          fi
          # Also check if library exists at expected path
          # Symlink library name if needed
          if [ -f "$XC/macos-arm64_x86_64/libghostty-fat.a" ] && [ ! -f "$XC/macos-arm64_x86_64/libghostty.a" ]; then
            ln -s libghostty-fat.a "$XC/macos-arm64_x86_64/libghostty.a"
          fi

      - name: Inject Firebase config
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > Resources/GoogleService-Info.plist
            echo "Firebase config injected"
          else
            echo "::error::GOOGLE_SERVICE_INFO_PLIST secret is required for release builds"
            exit 1
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Clome (Release)
        run: |
          xcodebuild -project Clome.xcodeproj -scheme Clome \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            SWIFT_VERSION=5 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - \
            --entitlements Resources/ClomeRelease.entitlements \
            build/DerivedData/Build/Products/Release/Clome.app

      - name: Package DMG and ZIP
        id: package
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Clome.app"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TAG="${TAG#v}"
          fi
          ARCH="$(uname -m)"

          mkdir -p dist

          # Create DMG
          DMG_NAME="Clome-${TAG}-${ARCH}.dmg"
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Clome" -srcfolder dmg-staging \
            -ov -format UDZO "dist/${DMG_NAME}"
          rm -rf dmg-staging

          # Create ZIP
          ZIP_NAME="Clome-${TAG}-${ARCH}.zip"
          cd "$(dirname "$APP_PATH")"
          zip -r -y "${GITHUB_WORKSPACE}/dist/${ZIP_NAME}" Clome.app
          cd "${GITHUB_WORKSPACE}"

          echo "dmg=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"
          echo "zip=dist/${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: Clome v${{ steps.package.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.dmg }}
            ${{ steps.package.outputs.zip }}
