name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        target: [aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build libghostty
        run: ./scripts/setup-ghostty.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || inputs.tag }}
          releaseName: "Clome ${{ github.ref_name || inputs.tag }}"
          releaseBody: |
            ## Clome ${{ github.ref_name || inputs.tag }}

            Open-source agentic desktop. Local agents, explicit capabilities, source-first.

            **Install:** download the `.dmg`, drag `Clome.app` into `/Applications/`. The app is not yet codesigned or notarized — first launch may require `xattr -dr com.apple.quarantine /Applications/Clome.app`.
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }}
